<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classic Cups – Menu</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --brown-dark: #3E1F0A;
    --brown-mid: #6B3A1F;
    --brown-warm: #8B4513;
    --amber: #D47C2A;
    --cream: #FFF8F0;
    --cream-mid: #F5EAD8;
    --cream-border: #E8D0B0;
    --gold: #C8960C;
    --text-main: #2C1A0E;
    --text-muted: #7A5C3C;
    --green: #2E7D32;
    --red: #C62828;
    --orange: #E65100;
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--cream); color: var(--text-main); min-height: 100vh; }

  /* HERO */
  .hero { background: var(--brown-dark); color: #fff; padding: 2.5rem 1.2rem 4rem; text-align: center; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 200px; height: 200px; border-radius: 50%; background: rgba(212,124,42,0.12); }
  .hero::after { content: ''; position: absolute; bottom: -80px; left: -40px; width: 240px; height: 240px; border-radius: 50%; background: rgba(212,124,42,0.07); }
  .hero-icon { margin-bottom: 0.4rem; }
  .hero-icon img { height: 3.4rem; width: auto; display: block; margin: 0 auto; }
  .hero-name { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px; line-height: 1.1; }
  .hero-type { font-size: 0.72rem; letter-spacing: 4px; text-transform: uppercase; color: var(--amber); margin-top: 4px; font-weight: 600; }
  .hero-info { margin-top: 1rem; font-size: 0.82rem; color: rgba(255,255,255,0.65); line-height: 2; }
  .social-link { display: inline-flex; align-items: center; gap: 5px; text-decoration: none; font-weight: 600; transition: opacity 0.15s; }
  .social-link:hover { opacity: 0.8; }
  .hero-social { margin-top: 0.3rem; font-size: 0.8rem; color: var(--amber); justify-content: center; }
  .footer-social { margin-top: 2px; font-size: 0.78rem; color: rgba(255,255,255,0.7); justify-content: center; }
  .hero-wave { position: absolute; bottom: 0; left: 0; width: 100%; overflow: hidden; line-height: 0; }
  .hero-wave svg { display: block; }

  /* FILTER */
  .filter-wrap { background: #fff; border-bottom: 1px solid var(--cream-border); position: sticky; top: 0; z-index: 20; }
  .filter-bar { display: flex; gap: 6px; overflow-x: auto; padding: 10px 14px; scrollbar-width: none; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn { white-space: nowrap; background: transparent; border: 1.5px solid var(--cream-border); color: var(--text-muted); padding: 6px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.18s; flex-shrink: 0; }
  .filter-btn.active, .filter-btn:hover { background: var(--brown-dark); color: #fff; border-color: var(--brown-dark); }

  /* MENU */
  .menu-body { max-width: 560px; margin: 0 auto; padding: 0 14px 3rem; }
  .section-label { font-size: 0.72rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--amber); margin: 1.8rem 0 0.8rem; display: flex; align-items: center; gap: 8px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--cream-border); }

  .item-card { background: #fff; border-radius: 14px; border: 1px solid var(--cream-border); padding: 12px; display: flex; gap: 12px; align-items: center; margin-bottom: 10px; position: relative; transition: opacity 0.2s; }
  .item-card.bestseller { border-color: var(--amber); }
  .item-card.unavailable { opacity: 0.38; filter: grayscale(40%); }

  .bs-ribbon { position: absolute; top: -8px; left: 12px; background: var(--amber); color: #fff; font-size: 0.6rem; font-weight: 800; padding: 2px 10px; border-radius: 20px; letter-spacing: 0.5px; text-transform: uppercase; }

  .item-thumb { width: 72px; height: 72px; border-radius: 10px; object-fit: cover; background: var(--cream-mid); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 2rem; overflow: hidden; border: 1px solid var(--cream-border); }
  .item-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  .item-thumb svg { width: 100%; height: 100%; }

  .item-body { flex: 1; min-width: 0; }
  .item-name { font-size: 0.93rem; font-weight: 700; line-height: 1.3; }
  .item-desc { font-size: 0.73rem; color: var(--text-muted); margin-top: 3px; }
  .item-price { font-size: 1.05rem; font-weight: 800; color: var(--brown-mid); flex-shrink: 0; }

  /* FOOTER */
  .footer { background: var(--brown-dark); color: rgba(255,255,255,0.7); text-align: center; padding: 2rem 1rem; font-size: 0.78rem; line-height: 2; }
  .footer-name { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .footer-note { margin-top: 1rem; font-size: 0.65rem; opacity: 0.45; }

  @media (max-width: 400px) { .hero-name { font-size: 1.8rem; } }
</style>
</head>

// state
let avail       = {};
let bestSellers = {};
let descs       = {};
let customItems = [];
let withdrawn   = new Set();
let activeCat   = 'all';

function startApp() {
  // ── FIREBASE INIT (compat SDK) ──
  firebase.initializeApp(FB_CONFIG);
  const db = firebase.firestore();

  // Seed default best sellers
  MENU.forEach(item => { if (item.defaultBS) bestSellers[item.id] = true; });

  // Show loading
  document.getElementById('menuBody').innerHTML = '<div style="text-align:center;padding:3rem;color:#8B6914;font-size:.9rem;">Loading menu…</div>';

  // Listen in real time
  db.collection('menu').doc('data').onSnapshot((snap) => {
    if (snap.exists) {
      const d = snap.data();
      avail       = d.avail       || {};
      bestSellers = d.bestSellers || {};
      descs       = d.descs       || {};
      customItems = d.customItems || [];
      withdrawn   = new Set(d.withdrawn || []);
      MENU.forEach(item => {
        if (item.defaultBS && bestSellers[item.id] === undefined) bestSellers[item.id] = true;
      });
    }
    render();
  }, (err) => {
    console.error('Firebase error:', err);
    MENU.forEach(item => { if (item.defaultBS) bestSellers[item.id] = true; });
    render();
  });
}
function getFullMenu() {
  const base = MENU.map(i => {
    const custom = customItems.find(c => c.id === i.id);
    return custom ? {...i, ...custom} : {...i};
  });
  const added = customItems.filter(c => !MENU.find(d => d.id === c.id));
  return [...base, ...added].filter(i => !withdrawn.has(i.id));
}

function setFilter(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function renderItemCard(item) {
  const isAvail  = avail[item.id] !== false;
  const isBs     = !!bestSellers[item.id];
  const desc     = descs[item.id] || item.desc || '';
  // Priority: 1) custom item uploaded image (from Firebase), 2) GitHub images/, 3) custom SVG, 4) emoji
  const imgSrc   = item.img || GITHUB_IMAGES[item.id] || null;
  const thumb = imgSrc
    ? '<div class="item-thumb"><img src="' + imgSrc + '" alt="' + item.name + '" onerror="this.parentElement.innerHTML=\'' + (item.emoji||'🍽️') + '\'"></div>'
    : SAMOSA_IDS.has(item.id)
      ? '<div class="item-thumb">' + SAMOSA_SVG + '</div>'
      : PATHIRI_IDS.has(item.id)
        ? '<div class="item-thumb" style="background:#FFFBEB;">' + PATHIRI_SVG + '</div>'
        : NUGGETS_IDS.has(item.id)
          ? '<div class="item-thumb" style="background:#FFFBEB;">' + NUGGETS_SVG + '</div>'
          : '<div class="item-thumb">' + (item.emoji || '🍽️') + '</div>';
  const ribbon = (isBs && isAvail) ? '<div class="bs-ribbon">⭐ Best Seller</div>' : '';
  return '<div class="item-card' + (isBs && isAvail ? ' bestseller' : '') + (!isAvail ? ' unavailable' : '') + '">'
       + ribbon + thumb
       + '<div class="item-body">'
       + '<div class="item-name">' + item.name + '</div>'
       + (desc ? '<div class="item-desc">' + desc + '</div>' : '')
       + '</div>'
       + '<div class="item-price">₹' + item.price + '</div>'
       + '</div>';
}

// Bestsellers first (stable sort keeps original relative order otherwise)
function bsFirst(items) {
  return [...items].sort((a, b) => (bestSellers[b.id] ? 1 : 0) - (bestSellers[a.id] ? 1 : 0));
}

function render() {
  const fullMenu = getFullMenu();
  let html = '';

  if (activeCat === 'bestsellers') {
    const bsItems     = fullMenu.filter(i => !!bestSellers[i.id]);
    const available   = bsItems.filter(i => avail[i.id] !== false);
    const unavailable = bsItems.filter(i => avail[i.id] === false);
    const sorted = [...available, ...unavailable];
    if (sorted.length) {
      html += '<div class="section-label">⭐ Best Sellers</div>';
      sorted.forEach(item => { html += renderItemCard(item); });
    }
    document.getElementById('menuBody').innerHTML = html || '<div style="text-align:center;padding:3rem;color:#8B6914;">No best sellers found</div>';
    return;
  }

  const catKeys = activeCat === 'all' ? Object.keys(CAT_LABELS) : [activeCat];

  catKeys.forEach(catKey => {
    const label    = CAT_LABELS[catKey];
    const allItems = fullMenu.filter(i => i.cat === catKey || i.cat === label);
    if (!allItems.length) return;

    const available   = allItems.filter(i => avail[i.id] !== false);
    const unavailable = allItems.filter(i => avail[i.id] === false);
    const sorted = [...bsFirst(available), ...bsFirst(unavailable)];

    html += '<div class="section-label">' + label + '</div>';
    sorted.forEach(item => { html += renderItemCard(item); });
  });
  document.getElementById('menuBody').innerHTML = html || '<div style="text-align:center;padding:3rem;color:#8B6914;">No items found</div>';
}

window.setFilter = setFilter;
</script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" onload="
  var s = document.createElement('script');
  s.src='https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js';
  s.onload = startApp;
  document.head.appendChild(s);
"></script>
</body>
